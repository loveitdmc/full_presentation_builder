<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Love IT DMC – Presentation Template</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<script>
// ─── PHOTO LIBRARY ─────────────────────────────────────────────────────────
// Drive photos: lh3.googleusercontent.com/d/[fileId]  (requires Google login)
// Unsplash:     images.unsplash.com/photo-[id]?w=1920&q=80  (public, no login)

const D = id => `https://lh3.googleusercontent.com/d/${id}`;
const U = id => `https://images.unsplash.com/photo-${id}?w=1920&q=80`;

// ─── TRIP DATA — Claude replaces this block with data from the quote PDF ────
const TRIP = {

  /* ── Identity ──────────────────────────────────────────────── */
  client:      "ACME Corporation",
  projectRef:  "202607002",
  quoteRef:    "202607002-Q",

  /* ── Trip basics ─────────────────────────────────────────── */
  title:       "Incentive Trip",
  destination: "Rome",
  country:     "Italy",
  dates:       "23 – 27 February 2027",
  nights:      4,
  pax:         120,

  /* ── Cover slide ─────────────────────────────────────────── */
  // cityPhoto: iconic aerial/landmark photo (Unsplash or Drive URL)
  cityPhoto:          "",
  cityPhotoPosition:  "center center",
  tagline: "La Dolce Vita, reimagined for your team.",

  /* ── Days ────────────────────────────────────────────────── */
  /*
     showSlide: false  →  no slide (transfers, etc.)
     type: "transfer" | "activity" | "dinner" | "hotel" | "gala" | "free"
     photos: [url1,url2,url3]  →  gallery slide (large left + 2 stacked right)
  */
  days: [
    {
      number: 1,
      date:   "23 February 2027",
      label:  "Arrival",
      activities: [{
        showSlide:     false,
        type:          "transfer",
        title:         "Airport Arrival Transfers",
        description:   "Dedicated Love IT staff and premium vehicles welcome your guests from touchdown to hotel check-in.",
        photo:         "", photoPosition: "center center",
        photos: [], options: [], supplierName: ""
      }]
    },
    {
      number: 2,
      date:   "24 February 2027",
      label:  "The Eternal City",
      activities: [{
        showSlide:     true,
        type:          "activity",
        title:         "Private Colosseum Visit",
        description:   "After closing time, the Colosseum is entirely yours — 120 guests guided by experts in absolute silence.",
        photo:         "", photoPosition: "center 40%",
        photos: [],
        options: [
          { label: "Option A", title: "Exclusive after-hours private visit" },
          { label: "Option B", title: "Expert-guided group tour" }
        ],
        supplierName: "Colosseum"
      }]
    }
  ],

  /* ── Closing slide ───────────────────────────────────────── */
  closing: {
    photo: "", photoPosition: "center center",
    headline: "Let's make it happen.",
    subline:  "Your dedicated Love IT team is ready to bring every detail to life.",
    contact:  "marco@loveit-dmc.com"
  }

};
</script>

<style>
:root{
  --nero:#0a0a0a;
  --notte:#111111;
  --warm-white:#f5f0e8;
  --gold:#c9a96e;
  --gold-light:#e0c898;
  --stone:#8a8070;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Montserrat',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--nero)}

#scroll{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch;
}
#scroll::-webkit-scrollbar{display:none}

section{
  position:relative;
  width:100%;
  height:100vh;
  scroll-snap-align:start;
  overflow:hidden;
  display:flex;
  align-items:flex-end;
}

.bg{
  position:absolute;
  inset:0;
  background-size:cover;
  background-repeat:no-repeat;
  transition:transform .6s ease;
}
section:hover .bg{transform:scale(1.02)}

.ov-dark{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.82) 0%,rgba(0,0,0,.35) 55%,rgba(0,0,0,.15) 100%)}
.ov-full{position:absolute;inset:0;background:rgba(0,0,0,.70)}

.content{
  position:relative;
  z-index:2;
  padding:3.5rem 5vw 5rem;
  max-width:860px;
  color:var(--warm-white);
}
.content-center{
  position:relative;
  z-index:2;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:3rem 5vw;
  color:var(--warm-white);
}
.content-dark{
  position:relative;
  z-index:2;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:3.5rem 6vw;
  color:var(--warm-white);
}

.eyebrow{
  font-family:var(--sans);
  font-size:.8rem;
  font-weight:500;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:1rem;
}
.display{
  font-family:var(--serif);
  font-size:clamp(2.8rem,6vw,5.5rem);
  font-weight:300;
  line-height:1.08;
  letter-spacing:-.01em;
}
.display em{font-style:italic;color:var(--gold-light)}
.headline{
  font-family:var(--serif);
  font-size:clamp(2rem,4.5vw,3.8rem);
  font-weight:300;
  line-height:1.12;
}
.headline em{font-style:italic;color:var(--gold-light)}
.body-text{
  font-family:var(--sans);
  font-size:.96rem;
  font-weight:300;
  line-height:1.75;
  color:rgba(245,240,232,.82);
  margin-top:1.4rem;
  max-width:560px;
}
.rule{
  width:48px;height:1px;
  background:var(--gold);
  margin:1.4rem 0;
}

.meta-row{
  display:flex;gap:.6rem;flex-wrap:wrap;
  margin-top:1.8rem;
}
.meta-pill{
  font-family:var(--sans);
  font-size:.8rem;
  font-weight:500;
  letter-spacing:.1em;
  text-transform:uppercase;
  border:1px solid rgba(201,169,110,.5);
  color:var(--gold-light);
  padding:.38rem .9rem;
  border-radius:2px;
}

.options-row{
  display:flex;
  gap:.5rem;
  flex-wrap:wrap;
  margin-top:1.6rem;
}
.opt-badge{
  display:flex;
  align-items:center;
  gap:.5rem;
  background:rgba(201,169,110,.12);
  border:1px solid rgba(201,169,110,.35);
  border-radius:2px;
  padding:.4rem .8rem;
}
.opt-label{
  font-family:var(--sans);
  font-size:.72rem;
  font-weight:600;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--gold);
}
.opt-title{
  font-family:var(--sans);
  font-size:.84rem;
  font-weight:300;
  color:var(--warm-white);
}

.counter{
  position:absolute;
  bottom:2.2rem;right:2.8rem;
  font-family:var(--sans);
  font-size:.65rem;
  font-weight:500;
  letter-spacing:.18em;
  color:rgba(245,240,232,.45);
  z-index:10;
}

#dots{
  position:fixed;
  right:1.5rem;top:50%;
  transform:translateY(-50%);
  display:flex;flex-direction:column;gap:.45rem;
  z-index:100;
}
.dot{
  width:5px;height:5px;
  border-radius:50%;
  background:rgba(201,169,110,.3);
  cursor:pointer;
  border:none;
  transition:background .3s,transform .3s;
}
.dot.active{
  background:var(--gold);
  transform:scale(1.5);
}

.logo-bar{
  position:fixed;
  top:1.8rem;left:2.8rem;
  z-index:100;
}
.wordmark{
  font-family:var(--sans);
  font-size:.7rem;
  font-weight:600;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--gold);
  opacity:.9;
}

.slide-cover .tagline{
  font-family:var(--sans);
  font-size:.9rem;
  font-weight:300;
  letter-spacing:.12em;
  color:rgba(245,240,232,.65);
  margin-top:1rem;
}

.slide-overview{background:var(--notte)}
.days-table{
  margin-top:2rem;
  width:100%;
  max-width:700px;
  border-collapse:collapse;
}
.days-table tr{border-bottom:1px solid rgba(201,169,110,.15)}
.days-table td{
  padding:.75rem 0;
  font-family:var(--sans);
  font-size:.9rem;
  font-weight:300;
  color:rgba(245,240,232,.8);
  vertical-align:top;
}
.days-table td:first-child{
  width:200px;
  color:var(--gold);
  font-size:.78rem;
  font-weight:500;
  letter-spacing:.1em;
  text-transform:uppercase;
  padding-right:1.5rem;
}
.days-table td.day-label-col{
  font-family:var(--serif);
  font-size:1.2rem;
  font-style:italic;
  color:var(--warm-white);
  font-weight:300;
}

/* ── GALLERY SLIDE ── */
.slide-gallery{position:relative;}
.gallery-grid{
  position:absolute;
  inset:0;
  display:grid;
  gap:3px;
  background:var(--nero);
}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{
  grid-template-columns:3fr 2fr;
  grid-template-rows:1fr 1fr;
}
.grid-3 .gallery-cell:first-child{grid-row:1 / 3;}
.grid-4{
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
}
.gallery-cell{
  background-size:cover;
  background-position:center;
  overflow:hidden;
  transition:transform .5s ease;
}
.gallery-cell:hover{transform:scale(1.03);}
.gallery-header{
  position:absolute;
  top:0;left:0;right:0;
  z-index:5;
  padding:1.4rem 2.8rem;
  background:linear-gradient(to bottom,rgba(0,0,0,.65) 0%,transparent 100%);
  pointer-events:none;
  display:flex;
  align-items:center;
  gap:1rem;
}
.gallery-label{
  font-family:var(--sans);
  font-size:.75rem;
  font-weight:500;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--gold);
}
.gallery-title-small{
  font-family:var(--serif);
  font-size:1.15rem;
  font-weight:300;
  font-style:italic;
  color:var(--warm-white);
  opacity:.85;
}

.slide-closing .contact{
  font-family:var(--sans);
  font-size:.88rem;
  font-weight:400;
  letter-spacing:.12em;
  color:var(--gold);
  margin-top:1.8rem;
  text-transform:lowercase;
}

@media print{
  #dots,.logo-bar{display:none}
  section{page-break-after:always}
}
</style>
</head>

<body>

<div class="logo-bar">
  <span class="wordmark">Love&thinsp;IT&thinsp;DMC</span>
</div>

<nav id="dots"></nav>
<div id="scroll"></div>

<script>
(function(){

  function bgStyle(photo, pos){
    if(!photo) return 'background:#1a1a1a;';
    return `background-image:url('${photo}');background-position:${pos||'center center'};background-size:cover;`;
  }

  function optionBadges(options){
    if(!options || !options.length) return '';
    return `<div class="options-row">
      ${options.map(o=>`
        <div class="opt-badge">
          <span class="opt-label">${o.label}</span>
          <span class="opt-title">${o.title}</span>
        </div>`).join('')}
    </div>`;
  }

  // ── Slide builders ────────────────────────────────────────────────────────

  function buildCover(trip, num, total){
    const cPhoto = trip.cityPhoto || trip.coverPhoto || '';
    const cPos   = trip.cityPhoto ? (trip.cityPhotoPosition||'center center') : (trip.coverPhotoPosition||'center center');
    return `
    <section class="slide-cover">
      <div class="bg" style="${bgStyle(cPhoto, cPos)}"></div>
      <div class="ov-dark"></div>
      <div class="content-center">
        <div class="eyebrow">${trip.client || 'Private Proposal'}</div>
        <h1 class="display">${trip.title}<br><em>${trip.destination}</em></h1>
        <p class="tagline">${trip.tagline || ''}</p>
        <div class="meta-row">
          <span class="meta-pill">${trip.dates}</span>
          <span class="meta-pill">${trip.pax} guests</span>
          <span class="meta-pill">${trip.country}</span>
        </div>
      </div>
      <span class="counter">01 / ${String(total).padStart(2,'0')}</span>
    </section>`;
  }

  function buildOverview(trip, num, total){
    const rows = trip.days.map(d => `
      <tr>
        <td>Day ${d.number} · ${d.date}</td>
        <td class="day-label-col">${d.label}</td>
      </tr>`).join('');
    return `
    <section class="slide-overview">
      <div class="content-dark">
        <div class="eyebrow">The Programme</div>
        <h2 class="headline">Your journey<br><em>at a glance</em></h2>
        <div class="rule"></div>
        <table class="days-table">${rows}</table>
      </div>
      <span class="counter">${String(num).padStart(2,'0')} / ${String(total).padStart(2,'0')}</span>
    </section>`;
  }

  function buildActivity(act, day, num, total, dayIdx, actIdx){
    const hasPhoto = !!act.photo;
    const ovClass  = hasPhoto ? 'ov-dark' : 'ov-full';
    const supAttr  = act.supplierName ? ` data-supplier="${act.supplierName.replace(/"/g,'&quot;')}"` : '';
    const dataAttrs = (dayIdx!==undefined) ? ` data-day="${dayIdx}" data-act="${actIdx}"${supAttr}` : '';
    return `
    <section${dataAttrs}>
      <div class="bg" style="${bgStyle(act.photo, act.photoPosition)}"></div>
      <div class="${ovClass}"></div>
      <div class="content">
        <div class="eyebrow">Day ${day.number} · ${day.date}</div>
        <h2 class="headline">${act.title}</h2>
        <p class="body-text">${act.description}</p>
        ${optionBadges(act.options)}
      </div>
      <span class="counter">${String(num).padStart(2,'0')} / ${String(total).padStart(2,'0')}</span>
    </section>`;
  }

  function buildGallery(act, day, num, total, dayIdx, actIdx){
    const photos = (act.photos || []).filter(Boolean);
    if(!photos.length) return '';
    // Always use 3-photo grid-3 layout (large left + 2 stacked right)
    const slots = [photos[0]||'', photos[1]||'', photos[2]||''];
    const cells = slots.map(url =>
      `<div class="gallery-cell"${url ? ` style="background-image:url('${url}')"` : ''}></div>`
    ).join('');
    const supAttr  = act.supplierName ? ` data-supplier="${act.supplierName.replace(/"/g,'&quot;')}"` : '';
    const dataAttrs = (dayIdx!==undefined) ? ` data-day="${dayIdx}" data-act="${actIdx}"${supAttr}` : '';
    return `
    <section class="slide-gallery"${dataAttrs}>
      <div class="gallery-grid grid-3">${cells}</div>
      <div class="gallery-header">
        <span class="gallery-label">Day ${day.number}</span>
        <span class="gallery-title-small">${act.title}</span>
      </div>
      <span class="counter">${String(num).padStart(2,'0')} / ${String(total).padStart(2,'0')}</span>
    </section>`;
  }

  function buildVideosGrid(act, day, num, total, dayIdx, actIdx){
    const supAttr  = act.supplierName ? ` data-supplier="${act.supplierName.replace(/"/g,'&quot;')}"` : '';
    const dataAttrs = (dayIdx!==undefined) ? ` data-day="${dayIdx}" data-act="${actIdx}"${supAttr}` : '';
    const vids = (act.videos || []).slice(0,6);
    const cols = vids.length===1?1:(vids.length===2||vids.length===4?2:3);
    const cells = vids.map(v=>{
      const yt = v.embedUrl.match(/youtube\.com\/embed\/([A-Za-z0-9_-]{11})/);
      const thumb = yt ? `https://img.youtube.com/vi/${yt[1]}/hqdefault.jpg` : '';
      const openUrl = (v.sourceUrl || (yt ? `https://www.youtube.com/watch?v=${yt[1]}` : v.embedUrl)).replace(/'/g,'%27').replace(/"/g,'&quot;');
      return `<div class="video-card">
        <div class="video-card-thumb" onclick="window.open('${openUrl}','_blank')" style="${thumb?`background-image:url('${thumb}')`:''}">
          <div class="video-card-play"><svg viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="38" fill="rgba(0,0,0,.55)" stroke="rgba(255,255,255,.6)" stroke-width="2"/><polygon points="32,24 32,56 60,40" fill="white"/></svg></div>
        </div>
        <div class="video-card-caption">${v.title || 'Performance'}</div>
      </div>`;
    }).join('');
    return `
    <section class="slide-videos"${dataAttrs}>
      <div class="videos-inner">
        <div class="eyebrow">Video</div>
        <h2 class="headline">${act.title}</h2>
        <div class="videos-grid videos-grid-${cols}">${cells}</div>
      </div>
      <span class="counter">${String(num).padStart(2,'0')} / ${String(total).padStart(2,'0')}</span>
    </section>`;
  }

  function buildFloorplansGrid(act, day, num, total, dayIdx, actIdx){
    const supAttr  = act.supplierName ? ` data-supplier="${act.supplierName.replace(/"/g,'&quot;')}"` : '';
    const dataAttrs = (dayIdx!==undefined) ? ` data-day="${dayIdx}" data-act="${actIdx}"${supAttr}` : '';
    const fps = (act.floorplans || []).slice(0,6);
    const cols = fps.length===1?1:(fps.length===2||fps.length===4?2:3);
    const cells = fps.map(p=>{
      const safeUrl = (p.fileUrl||'').replace(/'/g,'%27').replace(/"/g,'&quot;');
      const safeName = (p.filename||'planimetria.pdf').replace(/"/g,'&quot;');
      return `<div class="video-card">
        <a class="video-card-thumb" href="${safeUrl}" target="_blank" rel="noopener" style="${p.thumb?`background-image:url('${p.thumb}')`:''}">
          <div class="video-card-play video-card-download"><svg viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="38" fill="rgba(0,0,0,.55)" stroke="rgba(255,255,255,.6)" stroke-width="2"/><path d="M40 24 L40 46 M30 38 L40 48 L50 38 M28 54 L52 54" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></div>
        </a>
        <div class="video-card-caption">${p.name||'Planimetria'}${p.description?`<span class="video-card-sub">${p.description}</span>`:''}</div>
        <a class="fp-download-link" href="${safeUrl}" download="${safeName}" target="_blank" rel="noopener">&#8595; Scarica</a>
      </div>`;
    }).join('');
    return `
    <section class="slide-videos slide-floorplans"${dataAttrs}>
      <div class="videos-inner">
        <div class="eyebrow">Planimetrie</div>
        <h2 class="headline">${act.title}</h2>
        <div class="videos-grid videos-grid-${cols}">${cells}</div>
      </div>
      <span class="counter">${String(num).padStart(2,'0')} / ${String(total).padStart(2,'0')}</span>
    </section>`;
  }

  function buildClosing(trip, num, total){
    const c = trip.closing || {};
    return `
    <section class="slide-closing">
      <div class="bg" style="${bgStyle(c.photo, c.photoPosition)}"></div>
      <div class="ov-dark"></div>
      <div class="content">
        <div class="eyebrow">Love IT DMC · ${trip.projectRef || ''}</div>
        <h2 class="headline">${c.headline || "Let's make it happen."}</h2>
        <p class="body-text">${c.subline || 'Your dedicated Love IT team is ready.'}</p>
        ${c.contact ? `<p class="contact">${c.contact}</p>` : ''}
      </div>
      <span class="counter">${String(num).padStart(2,'0')} / ${String(total).padStart(2,'0')}</span>
    </section>`;
  }

  // ── Collect all slides ────────────────────────────────────────────────────
  const slideBuilders = [];

  slideBuilders.push((num, total) => buildCover(TRIP, num, total));
  slideBuilders.push((num, total) => buildOverview(TRIP, num, total));

  TRIP.days.forEach((day, dayIdx) => {
    day.activities.forEach((act, actIdx) => {
      if(act.showSlide !== false){
        slideBuilders.push((num, total) => buildActivity(act, day, num, total, dayIdx, actIdx));
        const galleryPhotos = (act.photos || []).filter(Boolean);
        if(galleryPhotos.length > 0){
          slideBuilders.push((num, total) => buildGallery(act, day, num, total, dayIdx, actIdx));
        }
        if(act.floorplans?.length){
          slideBuilders.push((num, total) => buildFloorplansGrid(act, day, num, total, dayIdx, actIdx));
        }
        if(act.videos?.length){
          slideBuilders.push((num, total) => buildVideosGrid(act, day, num, total, dayIdx, actIdx));
        }
      }
    });
  });

  slideBuilders.push((num, total) => buildClosing(TRIP, num, total));

  // ── Render ────────────────────────────────────────────────────────────────
  const TOTAL  = slideBuilders.length;
  const scroll = document.getElementById('scroll');
  const dotsNav = document.getElementById('dots');

  // Skip generation when slides already exist (saved-snapshot mode)
  if(scroll.children.length === 0){
    slideBuilders.forEach((builder, i) => {
      const html = builder(i + 1, TOTAL);
      const wrap = document.createElement('div');
      wrap.innerHTML = html.trim();
      const sec = wrap.firstElementChild;
      scroll.appendChild(sec);

      const dot = document.createElement('button');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.setAttribute('aria-label', `Slide ${i+1}`);
      dotsNav.appendChild(dot);
    });
  }

  // ── Navigation (runs for both fresh and pre-rendered) ─────────────────────
  const sections = () => scroll.querySelectorAll('section');
  const dots     = () => dotsNav.querySelectorAll('.dot');
  let current = 0;

  function goTo(idx){
    const secs = sections();
    if(idx < 0 || idx >= secs.length) return;
    secs[idx].scrollIntoView({behavior:'smooth'});
  }

  function updateDots(idx){
    dots().forEach((d,i) => d.classList.toggle('active', i===idx));
    current = idx;
  }

  // Bind dot clicks (works for both freshly created and pre-rendered dots)
  dots().forEach((d, i) => d.addEventListener('click', () => goTo(i)));

  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if(e.isIntersecting){
        const idx = Array.from(sections()).indexOf(e.target);
        if(idx >= 0) updateDots(idx);
      }
    });
  }, {root: scroll, threshold: 0.6});

  sections().forEach(s => io.observe(s));

  section{ width:16in!important;height:9in!important;page-break-after:always;break-after:page;page-break-inside:avoid;break-inside:avoid;overflow:hidden!important;display:flex!important; }
  .bg,.gallery-cell,.gallery-grid,.slide-overview,.slide-closing{ -webkit-print-color-adjust:exact!important;print-color-adjust:exact!important; }
  #dots,.logo-bar,#edit-controls,.edit-zone,.add-slide-btn,#add-slide-panel{ display:none!important; }
  [contenteditable]{ border-bottom:none!important;background:transparent!important; }
}
</style>

<div id="edit-controls">
  <button id="edit-btn" onclick="LoveitEditor.toggleEdit()">&#9998; Edit</button>
  <button id="save-btn" onclick="LoveitEditor.save()">&#8595; Save HTML</button>
  <button id="pdf-btn"  onclick="window.print()">&#8681; PDF</button>
</div>

<script>
let LoveitEditor={toggleEdit:()=>{},togglePhotos:()=>{},toggleText:()=>{},save:()=>{},pdf:()=>window.print()};
try{ LoveitEditor=(function(){
  let photoMode=false, textMode=false, editMode=false;
  const zones=[], addBtns=[], deleteBtns=[];
  let currentTarget=null;
  const TEXT_SEL='.headline,.display,.body-text,.tagline,.eyebrow,.gallery-title-small,.gallery-label';

  const fi=document.createElement('input');
  fi.type='file';fi.accept='image/*';fi.style.display='none';
  document.body.appendChild(fi);
  fi.addEventListener('change',()=>{ if(fi.files[0]) applyFile(fi.files[0],currentTarget); });

  function makeZone(target){
    const z=document.createElement('div');
    z.className='edit-zone';z.title='Drop a photo, or click to browse';z.textContent='Drop a photo, or click to browse';
    z.addEventListener('click',e=>{
      e.stopPropagation();currentTarget=target;
      const sec=target.closest('section');
      const dIdx=sec?.dataset.day, aIdx=sec?.dataset.act;
      let avail=(dIdx!==undefined&&aIdx!==undefined) ? (TRIP.days[+dIdx]?.activities[+aIdx]?.allPhotos||[]) : [];
      // Slide aggiunte dai picker (artisti/attività): foto salvate sulla sezione
      if(!avail.length&&sec?.dataset.allPhotos){
        try{ avail=JSON.parse(sec.dataset.allPhotos)||[]; }catch{}
      }
      _showPhotoPicker(target,avail);
    });
    z.addEventListener('dragover',e=>{ e.preventDefault();e.dataTransfer.dropEffect='copy';z.classList.add('drag-over'); });
    z.addEventListener('dragleave',()=>z.classList.remove('drag-over'));
    z.addEventListener('drop',e=>{ e.preventDefault();z.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/')) applyFile(f,target); });
    return z;
  }

  function applyFile(file,target){
    const reader=new FileReader();
    reader.onload=ev=>{
      target.style.backgroundImage=`url('${ev.target.result}')`;
      target.querySelector('.split-photo-placeholder')?.remove();
      if(target.animate) target.animate([{opacity:.4},{opacity:1}],{duration:280});
    };
    reader.readAsDataURL(file);
  }

  function applyUrl(url,target){
    target.style.backgroundImage=`url('${url}')`;
    target.querySelector('.split-photo-placeholder')?.remove();
    if(target.animate) target.animate([{opacity:.4},{opacity:1}],{duration:280});
  }

  let _photoPicker=null;
  function _showPhotoPicker(target,photos){
    if(_photoPicker){_photoPicker.remove();_photoPicker=null;}
    const panel=document.createElement('div');
    panel.id='photo-picker-panel';
    const hasPhotos=photos.length>0;
    panel.innerHTML=`
      <button class="pp-close" title="Chiudi">&times;</button>
      <div class="pp-title">${hasPhotos?'Foto disponibili — clicca per sostituire':'Sostituisci foto'}</div>
      ${hasPhotos?`<div class="pp-grid">${photos.map((url,i)=>`<div class="pp-thumb" data-idx="${i}" style="background-image:url('${url}')"></div>`).join('')}</div><div class="pp-divider"><span>oppure</span></div>`:''}
      <div class="pp-dropzone" id="pp-dz">&#8681;&nbsp; Trascina una foto qui, o clicca per sfogliare</div>
      <div class="pp-divider"><span>oppure</span></div>
      <div class="pp-linkrow">
        <input type="url" placeholder="&#128279;&nbsp; Incolla il link di una foto…" autocomplete="off"/>
        <button title="Usa questo link">→</button>
      </div>`;
    document.body.appendChild(panel);
    _photoPicker=panel;
    panel.querySelector('.pp-close').addEventListener('click',()=>{panel.remove();_photoPicker=null;});
    const linkInp=panel.querySelector('.pp-linkrow input');
    const _useLink=()=>{
      const u=linkInp.value.trim();
      if(!/^https?:\/\/\S+/i.test(u)){ linkInp.style.borderColor='rgba(220,60,60,.7)';return; }
      applyUrl(u,target);panel.remove();_photoPicker=null;
    };
    panel.querySelector('.pp-linkrow button').addEventListener('click',_useLink);
    linkInp.addEventListener('keydown',e=>{ if(e.key==='Enter') _useLink(); });
    linkInp.addEventListener('input',()=>{ linkInp.style.borderColor=''; });
    if(hasPhotos){
      panel.querySelectorAll('.pp-thumb').forEach((thumb,i)=>{
        thumb.addEventListener('click',()=>{ applyUrl(photos[i],target);panel.remove();_photoPicker=null; });
      });
    }
    const dz=panel.querySelector('#pp-dz');
    dz.addEventListener('click',()=>{ currentTarget=target;fi.value='';fi.click();panel.remove();_photoPicker=null; });
    dz.addEventListener('dragover',e=>{ e.preventDefault();dz.classList.add('drag-over'); });
    dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
    dz.addEventListener('drop',e=>{
      e.preventDefault();dz.classList.remove('drag-over');
      const f=e.dataTransfer.files[0];
      if(f&&f.type.startsWith('image/')){ applyFile(f,target);panel.remove();_photoPicker=null; }
    });
  }

  function _syncSaveBtn(){
    document.getElementById('save-btn').style.display=editMode?'inline-block':'none';
  }

  function toggleEdit(){
    editMode=!editMode;
    const btn=document.getElementById('edit-btn');
    btn.classList.toggle('active',editMode);
    btn.textContent=editMode?'✓ Fine':'✎ Edit';
    document.body.classList.toggle('edit-mode',editMode);
    if(editMode){
      // Activate photo zones
      photoMode=true;
      document.querySelectorAll('.bg').forEach(bg=>{ const z=makeZone(bg);bg.parentElement.appendChild(z);zones.push(z); });
      document.querySelectorAll('.gallery-cell,.split-photo').forEach(cell=>{ if(getComputedStyle(cell).position==='static') cell.style.position='relative';const z=makeZone(cell);cell.appendChild(z);zones.push(z); });
      // Activate text editing
      textMode=true;
      document.querySelectorAll(TEXT_SEL).forEach(el=>{ el.contentEditable='true';el.spellcheck=false; });
      // Add + and − buttons to all sections
      document.querySelectorAll('#scroll section').forEach(sec=>{ _addInsertBtn(sec);_addDeleteBtn(sec); });
    } else {
      // Deactivate photo zones
      photoMode=false;
      zones.forEach(z=>{ const p=z.parentElement;z.remove();if(p&&(p.classList.contains('gallery-cell')||p.classList.contains('split-photo'))) p.style.position=''; });
      zones.length=0;
      _closePanel();
      if(_photoPicker){_photoPicker.remove();_photoPicker=null;}
      // Deactivate text editing
      textMode=false;
      document.querySelectorAll('[contenteditable="true"]').forEach(el=>el.contentEditable='false');
      // Remove all add + delete buttons
      addBtns.forEach(b=>b.remove()); addBtns.length=0;
      deleteBtns.forEach(b=>b.remove()); deleteBtns.length=0;
    }
    _syncSaveBtn();
  }

  // Legacy: kept so any external callers still work
  function togglePhotos(){ if(!editMode) toggleEdit(); }
  function toggleText(){   if(!editMode) toggleEdit(); }

  function _addInsertBtn(sec){
    const btn=document.createElement('button');
    btn.className='add-slide-btn';btn.textContent='+ Aggiungi slide';
    btn.addEventListener('click',e=>{ e.stopPropagation();_showPanel(sec,btn); });
    sec.appendChild(btn);addBtns.push(btn);
  }

  function _addDeleteBtn(sec){
    const btn=document.createElement('button');
    btn.className='delete-slide-btn';btn.textContent='− Cancella slide';
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      _deleteSlide(sec,btn);
    });
    sec.appendChild(btn);deleteBtns.push(btn);
  }

  function _deleteSlide(sec,btn){
    const scroll=document.getElementById('scroll');
    const dotsNav=document.getElementById('dots');
    const idx=Array.from(scroll.querySelectorAll('section')).indexOf(sec);
    if(idx>=0){
      const dot=Array.from(dotsNav.querySelectorAll('.dot'))[idx];
      dot?.remove();
    }
    const bi=deleteBtns.indexOf(btn);
    if(bi>=0) deleteBtns.splice(bi,1);
    // Remove add button too
    const ab=sec.querySelector('.add-slide-btn');
    if(ab){ const ai=addBtns.indexOf(ab);if(ai>=0) addBtns.splice(ai,1); }
    sec.remove();
  }

  function _closePanel(){
    const p=document.getElementById('add-slide-panel');if(p) p.remove();
    document.removeEventListener('keydown',_escKey);
  }
  function _escKey(e){ if(e.key==='Escape') _closePanel(); }

      <button id="asp-close" title="Chiudi">&times;</button>

          <span>Singola</span>
        </button>

            <rect x="40" y="1" width="21" height="17" rx="2" fill="rgba(201,169,110,.15)" stroke="rgba(201,169,110,.45)" stroke-width="1.5"/>
            <rect x="40" y="22" width="21" height="17" rx="2" fill="rgba(201,169,110,.15)" stroke="rgba(201,169,110,.45)" stroke-width="1.5"/>
          </svg>
          <span>Grande sx</span>
        </button>

            <rect x="1" y="22" width="21" height="17" rx="2" fill="rgba(201,169,110,.15)" stroke="rgba(201,169,110,.45)" stroke-width="1.5"/>
            <rect x="25" y="1" width="36" height="38" rx="2" fill="rgba(201,169,110,.3)" stroke="rgba(201,169,110,.65)" stroke-width="1.5"/>
          </svg>
          <span>Grande dx</span>
        </button>
        <button class="asp-opt" data-layout="split-left">
          <svg viewBox="0 0 62 40" fill="none">
            <rect x="1" y="1" width="29" height="38" rx="2" fill="rgba(201,169,110,.3)" stroke="rgba(201,169,110,.65)" stroke-width="1.5"/>
            <rect x="33" y="1" width="28" height="38" rx="2" fill="rgba(201,169,110,.08)" stroke="rgba(201,169,110,.3)" stroke-width="1.5"/>
            <line x1="37" y1="13" x2="57" y2="13" stroke="rgba(201,169,110,.5)" stroke-width="1.5"/>
            <line x1="37" y1="20" x2="57" y2="20" stroke="rgba(201,169,110,.3)" stroke-width="1"/>
            <line x1="37" y1="26" x2="51" y2="26" stroke="rgba(201,169,110,.3)" stroke-width="1"/>
          </svg>

            <rect x="32" y="1" width="29" height="38" rx="2" fill="rgba(201,169,110,.3)" stroke="rgba(201,169,110,.65)" stroke-width="1.5"/>
            <line x1="5" y1="13" x2="25" y2="13" stroke="rgba(201,169,110,.5)" stroke-width="1.5"/>
            <line x1="5" y1="20" x2="25" y2="20" stroke="rgba(201,169,110,.3)" stroke-width="1"/>
            <line x1="5" y1="26" x2="19" y2="26" stroke="rgba(201,169,110,.3)" stroke-width="1"/>
          </svg>
          <span>Foto dx</span>
        </button>
      </div>
      <div class="asp-group-title">Documents</div>
      <div class="asp-options">
        <button class="asp-opt" data-layout="map">
          <svg viewBox="0 0 62 40" fill="none">
            <rect x="1" y="1" width="60" height="38" rx="2" fill="rgba(66,133,244,.1)" stroke="rgba(66,133,244,.5)" stroke-width="1.5"/>
            <circle cx="31" cy="16" r="6" fill="rgba(66,133,244,.3)" stroke="rgba(66,133,244,.7)" stroke-width="1.3"/>
            <circle cx="31" cy="16" r="2.5" fill="rgba(66,133,244,.8)"/>
            <path d="M26 36 Q31 28 36 36" stroke="rgba(66,133,244,.35)" stroke-width="1" fill="rgba(66,133,244,.08)"/>
          </svg>
          <span>Mappa</span>
        </button>
        <button class="asp-opt" data-layout="pdf">
          <svg viewBox="0 0 62 40" fill="none">
            <rect x="1" y="1" width="60" height="38" rx="2" fill="rgba(220,60,60,.08)" stroke="rgba(220,60,60,.4)" stroke-width="1.5"/>
            <rect x="19" y="4" width="18" height="24" rx="1.5" fill="rgba(220,60,60,.15)" stroke="rgba(220,60,60,.5)" stroke-width="1.3"/>
            <path d="M31 4 L37 10 L37 28 L19 28 L19 4 Z" fill="rgba(220,60,60,.1)" stroke="rgba(220,60,60,.4)" stroke-width="1.3"/>
            <path d="M31 4 L31 10 L37 10" stroke="rgba(220,60,60,.4)" stroke-width="1.3" fill="none"/>

          </svg>
          <span>PDF</span>
        </button>
        <button class="asp-opt" data-layout="video">
          <svg viewBox="0 0 62 40" fill="none">
            <rect x="1" y="1" width="60" height="38" rx="2" fill="rgba(80,200,120,.07)" stroke="rgba(80,200,120,.45)" stroke-width="1.5"/>
            <polygon points="22,10 22,30 43,20" fill="rgba(80,200,120,.35)" stroke="rgba(80,200,120,.65)" stroke-width="1.2"/>
          </svg>
          <span>Video</span>

          <svg viewBox="0 0 62 40" fill="none">
            <rect x="1" y="1" width="60" height="38" rx="2" fill="rgba(170,120,220,.08)" stroke="rgba(170,120,220,.45)" stroke-width="1.5"/>
            <rect x="10" y="7" width="42" height="26" rx="1" fill="none" stroke="rgba(170,120,220,.55)" stroke-width="1.3"/>

            <line x1="10" y1="22" x2="20" y2="22" stroke="rgba(170,120,220,.5)" stroke-width="1.2"/>
            <line x1="38" y1="20" x2="52" y2="20" stroke="rgba(170,120,220,.35)" stroke-width="1.1"/>
            <circle cx="44" cy="27" r="3" fill="none" stroke="rgba(170,120,220,.4)" stroke-width="1"/>
          </svg>
          <span>Planimetria</span>
        </button>
        ${_spacesBtn}

      <div class="asp-group-title">Activity</div>
      <div class="asp-options">

            <line x1="14" y1="11" x2="14" y2="29" stroke="rgba(230,140,60,.55)" stroke-width="1.3"/>
            <path d="M11 11 L11 17 M17 11 L17 17 M11 17 Q14 19 17 17" stroke="rgba(230,140,60,.45)" stroke-width="1.1" fill="none"/>

          <svg viewBox="0 0 62 40" fill="none">

            <path d="M31 7 L46 14 L16 14 Z" fill="rgba(220,120,160,.15)" stroke="rgba(220,120,160,.55)" stroke-width="1.2"/>
            <line x1="20" y1="16" x2="20" y2="30" stroke="rgba(220,120,160,.55)" stroke-width="1.6"/>
            <line x1="27" y1="16" x2="27" y2="30" stroke="rgba(220,120,160,.55)" stroke-width="1.6"/>
            <line x1="35" y1="16" x2="35" y2="30" stroke="rgba(220,120,160,.55)" stroke-width="1.6"/>
            <line x1="42" y1="16" x2="42" y2="30" stroke="rgba(220,120,160,.55)" stroke-width="1.6"/>
            <rect x="15" y="30" width="32" height="3" fill="rgba(220,120,160,.3)" stroke="rgba(220,120,160,.45)" stroke-width="1"/>
          </svg>
          <span>Venue</span>
        </button>
      </div>`;
    document.body.appendChild(panel);
    panel.querySelector('#asp-close').addEventListener('click',_closePanel);
    document.addEventListener('keydown',_escKey);
    panel.querySelectorAll('.asp-opt').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const layout=btn.dataset.layout;
        if(layout==='map'){ _showMapInput(panel,afterSec); }

      const resp=await fetch(apiBase+'/api/acts',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(body)

      const data=await resp.json();
      if(data.error){ alert('Errore: '+data.error); return; }

      // 1. Split slide: main photo + testo
      const mainPhoto=data.mainPhoto||(data.photos&&data.photos[0])||'';
      const sec1=document.createElement('section');
      sec1.className='slide-split slide-split-photo-left';sec1.setAttribute('data-added','1');

            </div>
            <div class="video-card-caption">${v.title||'Performance'}</div>
          </div>`;
        }).join('');
        sec3.innerHTML=`<div class="videos-inner"><div class="eyebrow">Video</div><h2 class="headline">${data.act||actName}</h2><div class="videos-grid videos-grid-${cols}">${cells}</div></div>`;
        sec3.querySelectorAll('.video-card-thumb').forEach(t=>{
          t.addEventListener('click',()=>window.open(t.dataset.url,'_blank'));
        });
        lastSec.insertAdjacentElement('afterend',sec3);
        if(window._loveitIO) window._loveitIO.observe(sec3);
        _insertDot(sec3);_addInsertBtn(sec3);if(editMode) _addDeleteBtn(sec3);
        if(textMode) sec3.querySelectorAll(TEXT_SEL+',.video-card-caption').forEach(el=>{el.contentEditable='true';el.spellcheck=false;});
        lastSec=sec3;
      }

      setTimeout(()=>sec1.scrollIntoView({behavior:'smooth'}),150);
    } catch(e){
      alert('Errore nel caricamento artista: '+e.message);
    }
  }

  function _toEmbedUrl(url){
    if(url.includes('/maps/embed')) return url;
    const srcM=url.match(/src=["']([^"']+)["']/);if(srcM) return _toEmbedUrl(srcM[1]);
    const coordM=url.match(/@(-?\d+\.\d+),(-?\d+\.\d+),(\d+)/);
    if(coordM) return `https://www.google.com/maps?q=${coordM[1]},${coordM[2]}&z=${coordM[3]}&output=embed`;
    const qM=url.match(/[?&]q=([^&]+)/);if(qM) return `https://www.google.com/maps?q=${qM[1]}&output=embed`;
    const placeM=url.match(/maps\/place\/([^/@?]+)/);
    if(placeM) return `https://www.google.com/maps?q=${decodeURIComponent(placeM[1])}&output=embed`;
    return `https://maps.google.com/maps?q=${encodeURIComponent(url)}&output=embed`;
  }

  async function _aiRewrite(ins,customInstruction){
    const el=_aiTarget;if(!el) return;
    if(ins==='undo'){
      if(el.dataset.aiPrev!==undefined){ el.innerText=el.dataset.aiPrev;delete el.dataset.aiPrev; }
      return;
    }
    const apiBase=window.LOVEIT_API_BASE||'';
    const original=el.innerText.trim();if(!original) return;
    const context=el.closest('section')?.querySelector('.headline,.gallery-title-small')?.innerText||'';
    const instruction=ins==='custom'?customInstruction:_AI_INS[ins];
    el.classList.add('ai-busy');
    try{
      const resp=await fetch(apiBase+'/api/generate-text',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({rewrite:{text:original,instruction,context}})
      });
      const data=await resp.json();
      if(data.error) throw new Error(data.error);
      if(data.text){ el.dataset.aiPrev=original;el.innerText=data.text; }
    }catch(e){ alert('Errore AI: '+e.message); }
    el.classList.remove('ai-busy');
  }
  document.addEventListener('focusin',e=>{
    if(!textMode) return;
    const el=e.target;
    if(el.isContentEditable&&!el.closest('.ai-bar')){ clearTimeout(_aiHideTimer);_showAiBar(el); }
  });
  document.addEventListener('focusout',()=>{
    clearTimeout(_aiHideTimer);
    _aiHideTimer=setTimeout(()=>{
      const a=document.activeElement;
      if(!a||(!a.isContentEditable&&!a.closest('.ai-bar'))) _hideAiBar();
    },250);
  });
  document.addEventListener('scroll',_hideAiBar,true);

  function _toVideoEmbed(url){
    if(!url) return null;
    const yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
    if(yt) return `https://www.youtube.com/embed/${yt[1]}?rel=0`;
    const vimeo=url.match(/vimeo\.com\/(\d+)/);
    if(vimeo) return `https://player.vimeo.com/video/${vimeo[1]}`;
    const drive=url.match(/drive\.google\.com\/file\/d\/([^/\?]+)/);
    if(drive) return `https://drive.google.com/file/d/${drive[1]}/preview`;
    if(/\.(mp4|webm|ogg)(\?|$)/i.test(url)) return url;
    return null;
  }

  function _showVideoInput(panel,afterSec){
    panel.querySelectorAll('.asp-options,.asp-group-title').forEach(el=>el.style.display='none');
    const div=document.createElement('div');
    div.innerHTML=`
      <div class="asp-map-input">
        <input type="text" id="asp-video-url" placeholder="YouTube, Vimeo, Drive o link diretto MP4…" autocomplete="off"/>
        <button id="asp-video-ok">Inserisci →</button>
      </div>
      <p class="asp-hint">Supporta <strong>YouTube</strong>, <strong>Vimeo</strong>, <strong>Google Drive</strong> e file MP4 diretti.</p>`;
    panel.appendChild(div);
    const inp=panel.querySelector('#asp-video-url');inp.focus();
    const confirm=()=>{
      const url=inp.value.trim();if(!url) return;
      const embed=_toVideoEmbed(url);
      if(!embed){ alert('URL video non riconosciuto. Usa un link YouTube, Vimeo, Drive o MP4.');return; }
      _closePanel();_insertVideoSlide(afterSec,embed,/\.(mp4|webm|ogg)(\?|$)/i.test(url));
    };
    panel.querySelector('#asp-video-ok').addEventListener('click',confirm);
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter') confirm(); });
  }

  function _insertVideoSlide(afterSec,embedUrl,isFile){
    const label=afterSec.querySelector('.gallery-label')?.textContent||'';
    const title=afterSec.querySelector('.gallery-title-small')?.textContent||'Performance';
    const sec=document.createElement('section');
    sec.setAttribute('data-added','1');
    // YouTube: thumbnail + play button
    const ytMatch=embedUrl.match(/youtube\.com\/embed\/([A-Za-z0-9_-]{11})/);
    if(ytMatch){
      const ytId=ytMatch[1];
      const thumb=`https://img.youtube.com/vi/${ytId}/maxresdefault.jpg`;
      const watchUrl=`https://www.youtube.com/watch?v=${ytId}`;
      sec.className='slide-video slide-video-yt';
      sec.style.cursor='pointer';
      sec.onclick=()=>window.open(watchUrl,'_blank');
      sec.innerHTML=`<div class="bg" style="background-image:url('${thumb}');background-size:cover;background-position:center"></div><div class="ov-dark"></div><div class="video-play-btn"><svg viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="38" fill="rgba(0,0,0,.55)" stroke="rgba(255,255,255,.6)" stroke-width="2"/><polygon points="32,24 32,56 60,40" fill="white"/></svg></div><div class="gallery-header"><span class="gallery-label">${label}</span><span class="gallery-title-small">${title}</span></div>`;
    } else {
      sec.className='slide-video';
      const mediaTag=isFile
        ?`<video src="${embedUrl}" controls playsinline></video>`
        :`<iframe src="${embedUrl}" allowfullscreen frameborder="0" allow="autoplay; fullscreen; picture-in-picture"></iframe>`;
      sec.innerHTML=`<div class="video-frame">${mediaTag}</div><div class="gallery-header"><span class="gallery-label">${label}</span><span class="gallery-title-small">${title}</span></div>`;
    }
    afterSec.insertAdjacentElement('afterend',sec);
    if(window._loveitIO) window._loveitIO.observe(sec);
    _insertDot(sec);_addInsertBtn(sec);if(editMode) _addDeleteBtn(sec);
    if(textMode){ sec.querySelectorAll(TEXT_SEL).forEach(el=>{ el.contentEditable='true';el.spellcheck=false; }); }
    setTimeout(()=>sec.scrollIntoView({behavior:'smooth'}),150);
  }

  function _insertGallerySlide(afterSec,layout){
    const label=afterSec.querySelector('.gallery-label')?.textContent||'';
    const title=afterSec.querySelector('.gallery-title-small')?.textContent||'';
    const dIdx=afterSec.dataset.day, aIdx=afterSec.dataset.act;
    const autoPhotos=(dIdx!==undefined&&aIdx!==undefined) ? (TRIP.days[+dIdx]?.activities[+aIdx]?.allPhotos||[]) : [];
    const count=layout==='grid-1'?1:3;
    const cells=Array.from({length:count},(_,i)=>{
      const url=autoPhotos[i]||'';
      return `<div class="gallery-cell"${url?` style="background-image:url('${url}')"`:''} ></div>`;
    }).join('');
    const sec=document.createElement('section');
    sec.className='slide-gallery';sec.setAttribute('data-added','1');
    if(dIdx!==undefined){ sec.dataset.day=dIdx; sec.dataset.act=aIdx; }
    sec.innerHTML=`<div class="gallery-grid ${layout}">${cells}</div><div class="gallery-header"><span class="gallery-label">${label}</span><span class="gallery-title-small">${title}</span></div>`;
    afterSec.insertAdjacentElement('afterend',sec);
    if(window._loveitIO) window._loveitIO.observe(sec);
    _insertDot(sec);
    if(photoMode){ sec.querySelectorAll('.gallery-cell').forEach(cell=>{ cell.style.position='relative';const z=makeZone(cell);cell.appendChild(z);zones.push(z); }); }
    if(textMode){ sec.querySelectorAll(TEXT_SEL).forEach(el=>{ el.contentEditable='true';el.spellcheck=false; }); }
    _addInsertBtn(sec);if(editMode) _addDeleteBtn(sec);
    setTimeout(()=>sec.scrollIntoView({behavior:'smooth'}),150);
  }

  // ── Spaces picker ─────────────────────────────────────────────────────────
  function _capsSummary(r){
    const parts=[];
    if(r.banquet)  parts.push(`Banquet ${r.banquet}`);
    if(r.theatre)  parts.push(`Theatre ${r.theatre}`);
    if(r.cocktail) parts.push(`Cocktail ${r.cocktail}`);
    if(r.classroom)parts.push(`Classroom ${r.classroom}`);
    if(r.boardroom)parts.push(`Boardroom ${r.boardroom}`);
    return parts.join(' · ')||'—';
  }

  function _showSpacesPicker(panel,afterSec,supplierName){
    panel.querySelectorAll('.asp-options,.asp-group-title').forEach(el=>el.style.display='none');
    panel.style.minWidth='520px';
    const apiBase=window.LOVEIT_API_BASE||'';
    const wrap=document.createElement('div');
    wrap.innerHTML='<div class="asp-artist-loading">🏛 Caricamento spazi…</div>';
    panel.appendChild(wrap);
    if(!apiBase){
      wrap.innerHTML='<p class="asp-artist-err">Funzione disponibile solo dalla versione online (Vercel).<br>Apri la presentazione dal server per usare il picker spazi.</p>';
      return;
    }
    fetch(`${apiBase}/api/supplier?supplier=${encodeURIComponent(supplierName)}`)
      .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(data=>{
        const rooms=data.rooms||[];
        if(!rooms.length){
          wrap.innerHTML='<p class="asp-artist-err">Nessuno spazio trovato per <strong>'+data.supplierName+'</strong> in Airtable.</p>';
          return;
        }
        const listHtml=rooms.map((r,i)=>`
          <button class="asp-room-item" data-idx="${i}">
            <div class="asp-room-thumb" style="${r.photo?`background-image:url('${r.photo.replace(/'/g,"\\'")}')`:''}">
              ${!r.photo?'<span>🏛</span>':''}
            </div>
            <div class="asp-room-info">
              <div class="asp-room-name">${r.name}</div>
              <div class="asp-room-meta">${[r.setting,r.area?r.area+' m²':null].filter(Boolean).join(' · ')||''}</div>
              <div class="asp-room-caps">${_capsSummary(r)}</div>
            </div>
          </button>`).join('');
        wrap.innerHTML=`
          <div class="asp-spaces-supplier">🏛 ${data.supplierName}</div>
          <input class="asp-artist-search" type="text" placeholder="🔍  Filtra sale…" autocomplete="off"/>
          <div class="asp-rooms-list">${listHtml}</div>`;
        const inp=wrap.querySelector('.asp-artist-search');
        const list=wrap.querySelector('.asp-rooms-list');
        inp.addEventListener('input',()=>{
          const q=inp.value.toLowerCase();
          list.querySelectorAll('.asp-room-item').forEach(c=>{
            c.style.display=c.querySelector('.asp-room-name').textContent.toLowerCase().includes(q)?'':'none';
          });
        });
        wrap.querySelectorAll('.asp-room-item').forEach(item=>{
          item.addEventListener('click',()=>{
            const room=rooms[+item.dataset.idx];
            _closePanel();
            _insertMeetingRoomSlide(afterSec,room);
          });
        });
      })
      .catch(e=>{ wrap.innerHTML=`<p class="asp-artist-err">Errore: ${e.message}</p>`; });
  }

  function _insertMeetingRoomSlide(afterSec,room){
    const capDefs=[
      {label:'Banquet',val:room.banquet},
      {label:'Theatre',val:room.theatre},
      {label:'Cocktail',val:room.cocktail},
      {label:'Classroom',val:room.classroom},
      {label:'Boardroom',val:room.boardroom},
    ].filter(c=>c.val);
    const capsHtml=capDefs.length?`
      <div class="room-caps">${capDefs.map(c=>`
        <div class="room-cap-item">
          <span class="room-cap-label">${c.label}</span>
          <span class="room-cap-value">${c.val}</span>
        </div>`).join('')}
      </div>`:'' ;
    const eyebrow=[room.setting,room.area?room.area+' m²':null].filter(Boolean).join(' · ');
    const bgStyle=room.photo?` style="background-image:url('${room.photo.replace(/'/g,"\\'")}')"`:' style=""';
    const phIcon=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="opacity:.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>`;
    const placeholder=!room.photo?`<div class="split-photo-placeholder">${phIcon}<span>Scegli una foto</span></div>`:'';

    const sec=document.createElement('section');
    sec.className='slide-split slide-split-photo-left slide-room';
    sec.setAttribute('data-added','1');
    if(afterSec.dataset.day!==undefined){ sec.dataset.day=afterSec.dataset.day; sec.dataset.act=afterSec.dataset.act; }
    if(afterSec.dataset.supplier) sec.dataset.supplier=afterSec.dataset.supplier;

    sec.innerHTML=`
      <div class="split-photo room-photo"${bgStyle}>${placeholder}</div>
      <div class="split-content">
        ${eyebrow?`<div class="room-eyebrow">${eyebrow}</div>`:''}
        <h2 class="headline">${room.name}</h2>
        ${capsHtml}
        <p class="body-text">${room.notes||'…'}</p>
      </div>`;

    afterSec.insertAdjacentElement('afterend',sec);
    if(window._loveitIO) window._loveitIO.observe(sec);
    _insertDot(sec);_addInsertBtn(sec);if(editMode) _addDeleteBtn(sec);

    // Placeholder → photo picker
    const ph=sec.querySelector('.split-photo-placeholder');
    if(ph){
      const spPhoto=sec.querySelector('.room-photo');
      ph.addEventListener('click',()=>{
        const avail=(afterSec.dataset.day!==undefined)?(TRIP.days[+afterSec.dataset.day]?.activities[+afterSec.dataset.act]?.allPhotos||[]):[];
        _showPhotoPicker(spPhoto,avail);
      });
      ph.addEventListener('dragover',e=>{ e.preventDefault();ph.classList.add('drag-over'); });
      ph.addEventListener('dragleave',()=>ph.classList.remove('drag-over'));
      ph.addEventListener('drop',e=>{ e.preventDefault();ph.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/')) applyFile(f,spPhoto); });
    }
    if(photoMode){
      sec.querySelectorAll('.room-photo').forEach(cell=>{
        cell.style.position='relative';const z=makeZone(cell);cell.appendChild(z);zones.push(z);
      });
    }
    if(textMode){ sec.querySelectorAll(TEXT_SEL).forEach(el=>{ el.contentEditable='true';el.spellcheck=false; }); }
    setTimeout(()=>sec.scrollIntoView({behavior:'smooth'}),150);
  }

  function _insertSplitSlide(afterSec,layout){
    const dIdx=afterSec.dataset.day, aIdx=afterSec.dataset.act;
    const autoPhotos=(dIdx!==undefined&&aIdx!==undefined) ? (TRIP.days[+dIdx]?.activities[+aIdx]?.allPhotos||[]) : [];
    const photoUrl=autoPhotos[0]||'';
    const bgStyle=photoUrl?` style="background-image:url('${photoUrl}')"`:' style=""';
    const phIcon=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="opacity:.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>`;
    const placeholder=!photoUrl?`<div class="split-photo-placeholder">${phIcon}<span>Scegli una foto</span></div>`:'';
    const photoDiv=`<div class="split-photo"${bgStyle}>${placeholder}</div>`;
    const textDiv=`<div class="split-content"><h2 class="headline">Titolo</h2><p class="body-text">Descrizione del fornitore o dell'esperienza…</p></div>`;
    const isLeft=layout==='split-left';
    const sec=document.createElement('section');
    sec.className=`slide-split slide-split-photo-${isLeft?'left':'right'}`;sec.setAttribute('data-added','1');
    if(dIdx!==undefined){ sec.dataset.day=dIdx; sec.dataset.act=aIdx; }
    sec.innerHTML=isLeft?`${photoDiv}${textDiv}`:`${textDiv}${photoDiv}`;
    afterSec.insertAdjacentElement('afterend',sec);
    if(window._loveitIO) window._loveitIO.observe(sec);
    _insertDot(sec);_addInsertBtn(sec);if(editMode) _addDeleteBtn(sec);
    // Placeholder click → open picker (always, regardless of photo mode)
    const ph=sec.querySelector('.split-photo-placeholder');
    if(ph){
      const spPhoto=sec.querySelector('.split-photo');
      ph.addEventListener('click',()=>{
        const avail=(dIdx!==undefined&&aIdx!==undefined)?(TRIP.days[+dIdx]?.activities[+aIdx]?.allPhotos||[]):[];
        _showPhotoPicker(spPhoto,avail);
      });
      // Also support drag & drop directly on placeholder
      ph.addEventListener('dragover',e=>{ e.preventDefault();ph.classList.add('drag-over'); });
      ph.addEventListener('dragleave',()=>ph.classList.remove('drag-over'));
      ph.addEventListener('drop',e=>{ e.preventDefault();ph.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/')) applyFile(f,spPhoto); });
    }
    if(photoMode){
      sec.querySelectorAll('.split-photo').forEach(cell=>{
        cell.style.position='relative';const z=makeZone(cell);cell.appendChild(z);zones.push(z);
      });
    }
    if(textMode){ sec.querySelectorAll(TEXT_SEL).forEach(el=>{ el.contentEditable='true';el.spellcheck=false; }); }
    setTimeout(()=>sec.scrollIntoView({behavior:'smooth'}),150);
  }

  function _insertMapSlide(afterSec,embedUrl){
    const sec=document.createElement('section');
    sec.className='slide-map';sec.setAttribute('data-added','1');
    sec.innerHTML=`<div class="map-frame"><iframe src="${embedUrl}" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div><div class="gallery-header"><span class="gallery-label">Location</span></div>`;
    afterSec.insertAdjacentElement('afterend',sec);
    if(window._loveitIO) window._loveitIO.observe(sec);
    _insertDot(sec);_addInsertBtn(sec);if(editMode) _addDeleteBtn(sec);
    if(textMode){ const lbl=sec.querySelector('.gallery-label');if(lbl){lbl.contentEditable='true';lbl.spellcheck=false;} }
    setTimeout(()=>sec.scrollIntoView({behavior:'smooth'}),150);
  }

  function _insertDot(newSec){
    const scroll=document.getElementById('scroll');
    const dotsNav=document.getElementById('dots');
    const idx=Array.from(scroll.querySelectorAll('section')).indexOf(newSec);
    const dot=document.createElement('button');dot.className='dot';dot.setAttribute('aria-label',`Slide ${idx+1}`);
    dot.addEventListener('click',()=>newSec.scrollIntoView({behavior:'smooth'}));
    const existingDots=Array.from(dotsNav.querySelectorAll('.dot'));
    if(idx>=0&&idx<existingDots.length) dotsNav.insertBefore(dot,existingDots[idx]);else dotsNav.appendChild(dot);
  }

  function save(){
    const raw='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
    const doc=new DOMParser().parseFromString(raw,'text/html');
    doc.querySelectorAll('.edit-zone,.add-slide-btn,.delete-slide-btn,#add-slide-panel,#photo-picker-panel').forEach(el=>el.remove());
    doc.querySelectorAll('.gallery-cell').forEach(c=>{ c.style.position='';if(!c.getAttribute('style')?.trim()) c.removeAttribute('style'); });
    doc.querySelectorAll('[contenteditable]').forEach(el=>el.removeAttribute('contenteditable'));
    doc.body.classList.remove('photo-mode','text-mode','edit-mode');
    const eb=doc.getElementById('edit-btn');if(eb){ eb.classList.remove('active');eb.textContent='✎ Edit'; }
    const s=doc.getElementById('save-btn');if(s) s.style.display='none';
    const clean='<!DOCTYPE html>\n'+doc.documentElement.outerHTML;
    const blob=new Blob([clean],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download=document.title.replace(/\s*[–—\xb7]\s*/g,' ').replace(/[^a-z0-9 ]/gi,'').trim().replace(/\s+/g,'_').toLowerCase()+'_edited.html';
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  }

  function pdf(){ window.print(); }

  return{toggleEdit,togglePhotos,toggleText,save,pdf};
})(); } catch(e){ console.error('LoveitEditor init error:',e); document.getElementById('pdf-btn').title='Error: '+e.message; }
</script>
